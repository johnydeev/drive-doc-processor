name: ia-drive-doc-processor

services:
  # ── Next.js web server + API ───────────────────────────────────
  web:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Límites para evitar que un memory leak o spike tire el host.
    # Reservations son hints (ignoradas en non-Swarm) pero documentan el baseline.
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Scheduler: escanea Drive y crea ProcessingJobs ─────────────
  scheduler:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["node", "dist/jobs/scheduler.js"]
    depends_on:
      web:
        condition: service_healthy
    # Servicio muy liviano: solo lista Drive periódicamente y crea ProcessingJobs.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Worker: procesa la cola de jobs ────────────────────────────
  worker:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["node", "dist/jobs/jobWorkerMain.js"]
    depends_on:
      web:
        condition: service_healthy
    # El más pesado: OCR (tesseract + canvas) + extracción IA + pdf-parse.
    # Picos altos al procesar PDFs grandes. 1.5G es holgado pero contenido.
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ── Cloudflare Tunnel ──────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://web:3000
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    # Cloudflared es muy liviano; un cap previene mal comportamiento upstream.
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
