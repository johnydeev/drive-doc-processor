services:
  # ── Next.js web server + API ───────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: drive-doc-processor:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Scheduler: escanea Drive y crea ProcessingJobs ─────────────
  scheduler:
    image: drive-doc-processor:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command: ["node", "dist/jobs/scheduler.js"]
    depends_on:
      web:
        condition: service_healthy

  # ── Worker: procesa la cola de jobs ────────────────────────────
  worker:
    image: drive-doc-processor:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command: ["node", "dist/jobs/jobWorkerMain.js"]
    depends_on:
      web:
        condition: service_healthy

# ── Cloudflare Tunnel ──────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://web:3000
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
