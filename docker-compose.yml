name: ia-drive-doc-processor

services:
  # ── Next.js web server + API ───────────────────────────────────
  web:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Scheduler: escanea Drive y crea ProcessingJobs ─────────────
  scheduler:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["node", "dist/jobs/scheduler.js"]
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Worker: procesa la cola de jobs ────────────────────────────
  worker:
    image: ghcr.io/johnydeev/ia-drive-doc-processor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["node", "dist/jobs/jobWorkerMain.js"]
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ── Cloudflare Tunnel ──────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://web:3000
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
