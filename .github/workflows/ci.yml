name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint + Type Check + Build Jobs ─────────────────────────────
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check (Next.js)
        run: npm run typecheck

      - name: Build jobs (worker + scheduler)
        run: npm run build:jobs

  # ── Build Docker image ─────────────────────────────────────────
  build:
    name: Docker Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/johnydeev/ia-drive-doc-processor:latest
            ghcr.io/johnydeev/ia-drive-doc-processor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (solo en push a master, self-hosted runner) ─────────
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # Crítica #3: el .env viene desde secrets.PROD_ENV_FILE (GitHub Secret),
      # en vez de copiarse desde un path hardcodeado en el runner. Requiere
      # configurar el secret en Settings → Secrets and variables → Actions.
      - name: Write env file from GitHub Secret
        shell: powershell
        env:
          PROD_ENV: ${{ secrets.PROD_ENV_FILE }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:PROD_ENV)) {
            Write-Host "::error::Secret 'PROD_ENV_FILE' no esta configurado en el repositorio."
            Write-Host "Configurarlo en: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          }
          # WriteAllText evita BOM y normaliza newlines; docker compose tolera CRLF en env_file
          [System.IO.File]::WriteAllText("$PWD\.env", $env:PROD_ENV)
          $lines = (Get-Content .env | Measure-Object -Line).Lines
          Write-Host "::notice::.env escrito desde secret ($lines lineas)"

      # Crítica #1: aborta el script si cualquier comando falla. PowerShell con
      # $ErrorActionPreference='Stop' solo cubre cmdlets — los exit codes de
      # native commands (docker, npx) hay que chequearlos manualmente con
      # $LASTEXITCODE. Sin esto, un migrate deploy fallido no impedia que se
      # levantaran containers con codigo nuevo contra DB vieja (silent failure).
      # Crítica #2: docker login con --password-stdin para no exponer el token
      # como argumento de comando (ps, /proc, warnings de docker).
      - name: Build and restart
        shell: powershell
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          function Invoke-Step {
            param([string]$Name, [scriptblock]$Body)
            Write-Host "==> $Name"
            & $Body
            if ($LASTEXITCODE -ne 0) { throw "$Name failed with exit code $LASTEXITCODE" }
          }

          Invoke-Step "docker login" {
            $env:GHCR_TOKEN | docker login ghcr.io -u johnydeev --password-stdin
          }
          Invoke-Step "docker pull" {
            docker pull "ghcr.io/johnydeev/ia-drive-doc-processor:${env:IMAGE_TAG}"
          }
          Invoke-Step "docker tag :latest" {
            docker tag "ghcr.io/johnydeev/ia-drive-doc-processor:${env:IMAGE_TAG}" "ghcr.io/johnydeev/ia-drive-doc-processor:latest"
          }
          Invoke-Step "prisma migrate deploy" {
            docker compose -p ia-drive-doc-processor run --rm web npx prisma migrate deploy
          }
          Invoke-Step "docker compose up" {
            docker compose -p ia-drive-doc-processor up -d --force-recreate
          }
          Invoke-Step "docker image prune" {
            docker image prune -f
          }

      - name: Wait for healthy (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "Waiting for web to be healthy..."
          for i in $(seq 1 30); do
            if docker compose -p ia-drive-doc-processor ps web | grep -q "healthy"; then
              echo "Web is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "Web did not become healthy in time"
          docker compose -p ia-drive-doc-processor logs web --tail 20
          exit 1

      - name: Wait for healthy (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Waiting for web to be healthy..."
          $healthy = $false
          for ($i = 1; $i -le 30; $i++) {
            $status = docker compose -p ia-drive-doc-processor ps web
            if ($status -match "healthy") {
              Write-Host "Web is healthy!"
              $healthy = $true
              break
            }
            Start-Sleep -Seconds 5
          }
          if (-not $healthy) {
            Write-Host "Web did not become healthy in time"
            docker compose -p ia-drive-doc-processor logs web --tail 20
            exit 1
          }
